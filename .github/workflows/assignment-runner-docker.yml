name: Build assignment runner Docker image

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "docker/assignment-runner/**"
      - "scripts/**"
      - "tests/test_student_lab_runner.py"
      - "tests/test_student_lab_runner_docker.py"
      - ".github/workflows/assignment-runner-docker.yml"
  push:
    branches:
      - main
    paths:
      - "docker/assignment-runner/**"
      - "scripts/**"
      - "tests/test_student_lab_runner.py"
      - "tests/test_student_lab_runner_docker.py"
      - ".github/workflows/assignment-runner-docker.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build assignment runner image
        run: docker build -t thebitlab-assignment-runner -f docker/assignment-runner/Dockerfile .

      - name: Install integration test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Smoke test assignment runner image
        run: |
          cat > "$RUNNER_TEMP/activity.json" <<'JSON'
          {
            "id": "docker-smoke-c",
            "linguaggio": "c",
            "test_cases": [
              {
                "name": "somma minima",
                "stdin": "2 3\n",
                "expected_stdout": "5\n"
              }
            ]
          }
          JSON
          cat > "$RUNNER_TEMP/main.c" <<'C'
          #include <stdio.h>

          int main(void) {
            int a;
            int b;
            if (scanf("%d %d", &a, &b) != 2) {
              return 1;
            }
            printf("%d\n", a + b);
            return 0;
          }
          C
          python scripts/grade_activity.py \
            --activity "$RUNNER_TEMP/activity.json" \
            --source "$RUNNER_TEMP/main.c" \
            --language c \
            --docker \
            --report "$RUNNER_TEMP/report.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["RUNNER_TEMP"]) / "report.json").read_text(encoding="utf-8"))
          assert report["passed"] is True
          assert report["status"] == "passed"
          PY

      - name: Smoke test Python runner image
        run: |
          cat > "$RUNNER_TEMP/activity-python.json" <<'JSON'
          {
            "id": "docker-smoke-python",
            "linguaggio": "python",
            "test_cases": [
              {
                "name": "incremento",
                "stdin": "4\n",
                "expected_stdout": "5\n"
              }
            ]
          }
          JSON
          cat > "$RUNNER_TEMP/main.py" <<'PY'
          value = int(input())
          print(value + 1)
          PY
          python scripts/grade_activity.py \
            --activity "$RUNNER_TEMP/activity-python.json" \
            --source "$RUNNER_TEMP/main.py" \
            --language python \
            --docker \
            --report "$RUNNER_TEMP/report-python.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["RUNNER_TEMP"]) / "report-python.json").read_text(encoding="utf-8"))
          assert report["passed"] is True
          assert report["status"] == "passed"
          assert report["language"] == "python"
          PY

      - name: Smoke test Node.js and SQLite runner image
        run: |
          cat > "$RUNNER_TEMP/activity-node.json" <<'JSON'
          {"id":"docker-smoke-node","linguaggio":"javascript","test_cases":[{"name":"incremento","stdin":"4\n","expected_stdout":"5\n"}]}
          JSON
          cat > "$RUNNER_TEMP/main.js" <<'JS'
          let value = "";
          process.stdin.on("data", chunk => value += chunk).on("end", () => console.log(Number(value) + 1));
          JS
          python scripts/grade_activity.py --activity "$RUNNER_TEMP/activity-node.json" --source "$RUNNER_TEMP/main.js" --language javascript --docker --report "$RUNNER_TEMP/report-node.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["RUNNER_TEMP"]) / "report-node.json").read_text(encoding="utf-8"))
          assert report["passed"] is True
          assert report["language"] == "javascript"
          PY
          cat > "$RUNNER_TEMP/activity-sql.json" <<'JSON'
          {"id":"docker-smoke-sql","linguaggio":"sql","test_cases":[{"name":"somma","expected_stdout":"5\n"}]}
          JSON
          printf 'SELECT 2 + 3;\n' > "$RUNNER_TEMP/main.sql"
          python scripts/grade_activity.py --activity "$RUNNER_TEMP/activity-sql.json" --source "$RUNNER_TEMP/main.sql" --language sql --docker --report "$RUNNER_TEMP/report-sql.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["RUNNER_TEMP"]) / "report-sql.json").read_text(encoding="utf-8"))
          assert report["passed"] is True
          assert report["language"] == "sql"
          PY

      - name: Smoke test student lab Docker backend
        run: |
          mkdir -p "$RUNNER_TEMP/student-root"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          from scripts import assignment_records

          root = Path(os.environ["RUNNER_TEMP"]) / "student-root"
          activity_dir = root / "activities"
          activity_dir.mkdir(parents=True, exist_ok=True)
          activity_path = activity_dir / "c-base-somma-001.json"
          activity_path.write_text(
              json.dumps(
                  {
                      "schema_version": "1.0",
                      "id": "c-base-somma-001",
                      "title": "Somma C",
                      "kind": "laboratorio",
                      "difficulty": "B",
                      "topics": ["variabili"],
                      "language": "c",
                      "source_name": "main.c",
                      "instructions": "Somma due interi.",
                      "grading_policy": {
                          "compila": True,
                          "test": True,
                          "sandbox": True,
                          "ai_feedback": False,
                      },
                      "test_cases": [
                          {
                              "name": "somma minima",
                              "stdin": "2 3\n",
                              "expected_stdout": "5\n",
                          }
                      ],
                  }
              ),
              encoding="utf-8",
          )
          assignment = assignment_records.build_assignment_record(
              activity_id="c-base-somma-001",
              activity_path="activities/c-base-somma-001.json",
              target_type="student",
              assigned_at="2026-10-12T09:00:00+02:00",
              due_at="2026-10-19T23:59:00+02:00",
              targets=[
                  {
                      "student_id": "rossi-mario",
                      "display_name": "Rossi Mario",
                      "path": "examples/assignment_tracking/student_repos/rossi-mario",
                  }
              ],
          )
          assignment_records.JsonAssignmentRecordStorage(root).write_assignment(assignment)
          workspace = root / "examples" / "assignment_tracking" / "student_repos" / "rossi-mario" / "assignments" / "c-base-somma-001"
          workspace.mkdir(parents=True, exist_ok=True)
          (workspace / "main.c").write_text(
              """#include <stdio.h>

          int main(void) {
            int a;
            int b;
            if (scanf("%d %d", &a, &b) != 2) {
              return 1;
            }
            printf("%d\\n", a + b);
            return 0;
          }
          """,
              encoding="utf-8",
          )
          PY
          python scripts/student_lab_runner.py \
            --root "$RUNNER_TEMP/student-root" \
            --student-id rossi-mario \
            --activity-id c-base-somma-001 \
            --backend docker \
            --write-report
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(
              (
                  Path(os.environ["RUNNER_TEMP"])
                  / "student-root"
                  / "examples"
                  / "assignment_tracking"
                  / "student_repos"
                  / "rossi-mario"
                  / "reports"
                  / "c-base-somma-001"
                  / "latest.json"
              ).read_text(encoding="utf-8")
          )
          assert report["backend"] == "docker"
          assert report["passed"] is True
          assert report["status"] == "passed"
          assert report["summary"] == {"passed": 1, "total": 1}
          PY

      - name: Test Node.js and SQL through the student lab
        env:
          THEBITLAB_RUN_DOCKER_TESTS: "1"
        run: python -m pytest -q tests/test_student_lab_runner_docker.py
