name: Smoke student repository template

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "templates/student-repository/**"
      - "scripts/grade_activity.py"
      - "docker/assignment-runner/**"
      - ".github/workflows/student-template-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "templates/student-repository/**"
      - "scripts/grade_activity.py"
      - "docker/assignment-runner/**"
      - ".github/workflows/student-template-smoke.yml"

jobs:
  smoke-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout TheBitLab source
        uses: actions/checkout@v4

      - name: Build grading Docker image
        run: docker build -t thebitlab-assignment-runner -f docker/assignment-runner/Dockerfile .

      - name: Prepare simulated student repository
        run: |
          mkdir -p "$RUNNER_TEMP/student-work/assignments/c-base-somma-001"
          cat > "$RUNNER_TEMP/student-work/assignments/c-base-somma-001/activity.json" <<'JSON'
          {
            "id": "c-base-somma-001",
            "linguaggio": "c",
            "test_cases": [
              {
                "name": "somma minima",
                "stdin": "2 3\n",
                "expected_stdout": "5\n"
              }
            ]
          }
          JSON
          cat > "$RUNNER_TEMP/student-work/assignments/c-base-somma-001/main.c" <<'C'
          #include <stdio.h>

          int main(void) {
            int a;
            int b;
            if (scanf("%d %d", &a, &b) != 2) {
              return 1;
            }
            printf("%d\n", a + b);
            return 0;
          }
          C

      - name: Run template-like grading
        run: |
          mkdir -p "$RUNNER_TEMP/thebitlab-report"
          python scripts/grade_activity.py \
            --activity "$RUNNER_TEMP/student-work/assignments/c-base-somma-001/activity.json" \
            --source "$RUNNER_TEMP/student-work/assignments/c-base-somma-001/main.c" \
            --language c \
            --docker \
            --report "$RUNNER_TEMP/thebitlab-report/report.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads((Path(os.environ["RUNNER_TEMP"]) / "thebitlab-report" / "report.json").read_text(encoding="utf-8"))
          assert report["passed"] is True
          assert report["status"] == "passed"
          PY
